<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <h2>🍔 Foodies</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Menu</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="content">
            <h1>Delicious Food Delivered To You</h1>
            <p>Fresh, tasty, and healthy meals at your doorstep.</p>
            <button>Order Now</button>
        </div>
    </section>

    <!-- Menu Section -->
    <section class="menu">
        <h2>Our Popular Dishes</h2>

        <div class="cards">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" alt="Burger">
                <h3>Burger</h3>
                <p>Juicy Cheese Burger</p>
                <h4>₹199</h4>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" alt="Pizza">
                <h3>Pizza</h3>
                <p>Italian Veg Pizza</p>
                <h4>₹299</h4>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=400" alt="Pasta">
                <h3>Pasta</h3>
                <p>Creamy White Sauce Pasta</p>
                <h4>₹249</h4>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Foodies. All Rights Reserved.</p>
    </footer>

</body>
</html>
